function renderCatalog() {
  const root = document.getElementById('catalog');
  root.innerHTML = '';
  CATEGORIES.forEach((cat, ci) => {
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.dataset.cat = ci;
    const head = document.createElement('div');
    head.className = 'cat-header';
    head.innerHTML = `
      <div class="cat-emoji">${cat.emoji}</div>
      <div>
        <div class="cat-title">${cat.title}</div>
        <div class="cat-sub">${cat.sub}</div>
      </div>`;
    sec.appendChild(head);
    const grid = document.createElement('div');
    grid.className = 'item-grid';
    cat.items.forEach((it, ii) => {
      const subsHtml = it.subs.map(s => SUBS[s] ? `<span class="item-sub-chip" data-sub="${s}">${SUBS[s].name.replace('補助金','').replace('助成金','').slice(0,5)}</span>` : '').join('');
      const card = document.createElement('div');
      card.className = 'item';
      card.dataset.subs = it.subs.join(',');
      card.innerHTML = `
        ${it.popular ? '<div class="item-popular">🔥 人気</div>' : ''}
        <div class="item-visual">${it.v}</div>
        <div class="item-name">${it.name}</div>
        <div class="item-desc">${it.desc}</div>
        <div class="item-subs">${subsHtml}</div>
        <div class="item-price">💰 ${it.price}</div>`;
      card.onclick = () => openModal(ci, ii);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    root.appendChild(sec);
  });
  applyFilter();
}

let currentFilter = 'all';
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.f === f);
  });
  document.querySelectorAll('.sub-chip').forEach(c => {
    c.style.outline = (c.dataset.sub === f) ? '2px solid #06C755' : 'none';
    c.style.outlineOffset = '1px';
  });
  applyFilter();
  window.scrollTo({ top: document.querySelector('.filter-bar').offsetTop - 60, behavior: 'smooth' });
}
function applyFilter() {
  let visible = 0;
  document.querySelectorAll('.cat-section').forEach(sec => {
    let secVisible = 0;
    sec.querySelectorAll('.item').forEach(card => {
      const subs = card.dataset.subs.split(',');
      const ok = currentFilter === 'all' || subs.includes(currentFilter);
      card.dataset.hidden = ok ? 'false' : 'true';
      if (ok) { secVisible++; visible++; }
    });
    sec.dataset.empty = secVisible === 0 ? 'true' : 'false';
  });
  document.getElementById('visibleCount').textContent = visible;
}

function openModal(ci, ii) {
  const it = CATEGORIES[ci].items[ii];
  document.getElementById('mVisual').textContent = it.v;
  document.getElementById('mName').textContent = it.name;
  document.getElementById('mCat').textContent = CATEGORIES[ci].title;
  document.getElementById('mUsecase').textContent = it.uc;
  document.getElementById('mPrice').textContent = it.price;
  const sl = document.getElementById('mSubsidies');
  sl.innerHTML = it.subs.filter(s => SUBS[s]).map(s => `
    <div class="modal-sub-item" data-sub="${s}">
      <div class="modal-sub-icon">${SUBS[s].icon}</div>
      <div class="modal-sub-text">
        <div class="modal-sub-name">${SUBS[s].name}</div>
        <div class="modal-sub-amt">${SUBS[s].amt}</div>
      </div>
    </div>`).join('');
  document.getElementById('modalBack').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalBack').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOnBg(e) {
  if (e.target.id === 'modalBack') closeModal();
}

renderCatalog();
</script>
